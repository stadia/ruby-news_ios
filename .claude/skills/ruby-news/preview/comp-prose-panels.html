<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 16px; font-family: var(--font-primary); color: var(--text-content); }
    .panel { background: var(--bg-surface-muted); border-radius: 12px; padding: 18px; margin-bottom: 8px; }
    .info { border-left: 4px solid var(--info-solid); }
    .brand { border-left: 4px solid var(--brand-primary); }
    .panel h3 { margin: 0 0 6px; font-size: 14px; font-weight: 600; }
    .info h3 { color: var(--info-text); }
    .brand h3 { color: var(--accent-text); }
    .panel p { margin: 0; font-size: 13px; line-height: 1.6; color: var(--text-content-secondary); }
</style>
</head>
<body>
<div class="panel info">
    <h3>도입</h3>
    <p>이 글은 Hotwire Native를 도입하면서 마주친 path configuration의 모범 사례를 정리합니다.</p>
</div>
<div class="panel brand">
    <h3>결론</h3>
    <p>네이티브 셸 + 웹뷰 구조는 코드 공유율을 80% 이상 끌어올리며, 새 화면도 서버에서 쉽게 추가할 수 있습니다.</p>
</div>
</body>
</html>
