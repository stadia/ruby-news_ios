<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 18px; font-family: var(--font-primary); color: var(--text-content); display: flex; gap: 18px; align-items: center; }
    img { width: 96px; height: 96px; border-radius: 22px; box-shadow: 0 10px 15px -3px oklch(0 0 0 / 0.2); }
    .info { display: flex; flex-direction: column; gap: 4px; }
    .brand { font-size: 18px; font-weight: 600; color: var(--text-content); }
    .brand .accent { color: var(--accent-text); }
    .url { font-size: 12px; color: var(--text-content-muted); font-family: ui-monospace, monospace; }
    .meta { font-size: 11px; color: var(--text-content-muted); margin-top: 4px; line-height: 1.5; }
</style>
</head>
<body>
<img src="../assets/icon.svg" alt="Ruby-News icon">
<div class="info">
    <div class="brand">Ruby-News || <span class="accent">루비 AI 뉴스</span></div>
    <div class="url">ruby-news.kr</div>
    <div class="meta">primary 512×512 SVG · favicons icon.png · icon-192.png · apple-touch-icon.png</div>
</div>
</body>
</html>
