<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); color: var(--text-content); padding: 16px; font-family: var(--font-primary); box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .row { display: flex; gap: 6px; }
    .swatch { flex: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-subtle); }
    .chip { height: 44px; }
    .meta { padding: 6px 8px; font-size: 10px; background: var(--bg-surface); }
    .name { color: var(--text-content); font-weight: 600; font-size: 11px; }
    .val { color: var(--text-content-muted); font-family: ui-monospace, monospace; font-size: 9px; margin-top: 1px; }
    .group-label { color: var(--text-content-muted); font-size: 11px; font-weight: 500; margin-bottom: 4px; }
    .col { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="grid">
    <div class="col">
        <div class="group-label">Success</div>
        <div class="row">
            <div class="swatch"><div class="chip" style="background:oklch(0.648 0.175 132)"></div><div class="meta"><div class="name">solid</div><div class="val">.648 .175 132</div></div></div>
        </div>
    </div>
    <div class="col">
        <div class="group-label">Warning</div>
        <div class="row">
            <div class="swatch"><div class="chip" style="background:oklch(0.769 0.165 70)"></div><div class="meta"><div class="name">solid</div><div class="val">.769 .165 70</div></div></div>
        </div>
    </div>
    <div class="col">
        <div class="group-label">Error / Danger</div>
        <div class="row">
            <div class="swatch"><div class="chip" style="background:oklch(0.577 0.215 27)"></div><div class="meta"><div class="name">solid</div><div class="val">.577 .215 27</div></div></div>
            <div class="swatch"><div class="chip" style="background:oklch(0.711 0.166 22)"></div><div class="meta"><div class="name">text</div><div class="val">.711 .166 22</div></div></div>
        </div>
    </div>
    <div class="col">
        <div class="group-label">Info</div>
        <div class="row">
            <div class="swatch"><div class="chip" style="background:oklch(0.546 0.215 263)"></div><div class="meta"><div class="name">solid</div><div class="val">.546 .215 263</div></div></div>
            <div class="swatch"><div class="chip" style="background:oklch(0.714 0.143 255)"></div><div class="meta"><div class="name">text</div><div class="val">.714 .143 255</div></div></div>
        </div>
    </div>
</div>
</body>
</html>
