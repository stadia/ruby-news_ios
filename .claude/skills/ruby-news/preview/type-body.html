<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 18px; font-family: var(--font-primary); box-sizing: border-box; color: var(--text-content); }
    .row { display: flex; align-items: baseline; gap: 14px; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
    .row:last-child { border-bottom: 0; }
    .label { color: var(--text-content-muted); font-size: 10px; font-family: ui-monospace, monospace; min-width: 90px; flex-shrink: 0; }
    .body-lg { font-size: 16px; line-height: 1.625; font-weight: 400; color: var(--text-content-secondary); }
    .body { font-size: 14px; line-height: 1.5; font-weight: 400; color: var(--text-content-secondary); }
    .meta { font-size: 14px; line-height: 1.5; font-weight: 500; color: var(--text-content-muted); }
    .caption { font-size: 12px; line-height: 1.4; font-weight: 400; color: var(--text-content-muted); }
</style>
</head>
<body>
    <div class="row"><div class="label">16 / 400 / 1.625</div><div class="body-lg">한국어 가독성을 위해 본문은 1.625의 행간을 사용합니다. AI가 요약한 내용을 빠르게 훑어볼 수 있도록 구성됩니다.</div></div>
    <div class="row"><div class="label">14 / 400 / 1.5</div><div class="body">기본 본문 — 카드 안의 요약, 댓글 본문, 폼 헬프 텍스트에 사용합니다.</div></div>
    <div class="row"><div class="label">14 / 500 / 1.5</div><div class="meta">메타 — 작성자 · 발행일 · 댓글 수</div></div>
    <div class="row"><div class="label">12 / 400 / 1.4</div><div class="caption">12px caption · 9분 전 · footer 안내문</div></div>
</body>
</html>
