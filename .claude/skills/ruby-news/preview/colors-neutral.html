<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); color: var(--text-content); padding: 16px; font-family: var(--font-primary); box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
    .swatch { border-radius: 6px; overflow: hidden; border: 1px solid var(--border-subtle); }
    .chip { height: 48px; }
    .meta { padding: 6px 4px; font-size: 9.5px; line-height: 1.25; text-align: center; background: var(--bg-surface); }
    .name { color: var(--text-content); font-weight: 600; }
    .val { color: var(--text-content-muted); font-family: ui-monospace, monospace; font-size: 8.5px; margin-top: 2px; }
</style>
</head>
<body>
<div class="grid">
    <div class="swatch"><div class="chip" style="background:oklch(0.984 0.003 248)"></div><div class="meta"><div class="name">50</div><div class="val">.984</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.968 0.007 248)"></div><div class="meta"><div class="name">100</div><div class="val">.968</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.929 0.013 256)"></div><div class="meta"><div class="name">200</div><div class="val">.929</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.869 0.020 253)"></div><div class="meta"><div class="name">300</div><div class="val">.869</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.711 0.035 257)"></div><div class="meta"><div class="name">400</div><div class="val">.711</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.554 0.041 257)"></div><div class="meta"><div class="name">500</div><div class="val">.554</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.446 0.037 257)"></div><div class="meta"><div class="name">600</div><div class="val">.446</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.372 0.039 257)"></div><div class="meta"><div class="name">700</div><div class="val">.372</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.280 0.037 260)"></div><div class="meta"><div class="name">800</div><div class="val">.280</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.208 0.040 266)"></div><div class="meta"><div class="name">900</div><div class="val">.208</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.129 0.041 265)"></div><div class="meta"><div class="name">950</div><div class="val">.129</div></div></div>
</div>
</body>
</html>
