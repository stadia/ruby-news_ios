<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 16px; font-family: var(--font-primary); color: var(--text-content); }
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px; background: var(--bg-surface); border-radius: 10px; border: 1px solid var(--border-subtle); }
    svg { width: 24px; height: 24px; color: var(--text-content); stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .lbl { font-size: 9.5px; color: var(--text-content-muted); font-family: ui-monospace, monospace; text-align: center; }
</style>
</head>
<body>
<div class="grid">
    <div class="item"><svg viewBox="0 0 24 24"><path d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.5 20.25a7.5 7.5 0 0 1 15 0"/></svg><div class="lbl">User</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M12 21a9 9 0 1 0-9-9c0 1.5.4 2.9 1 4.1L3 21l4.9-1c1.2.6 2.6 1 4.1 1Z"/></svg><div class="lbl">ChatBubble</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M3 8.25V18a2.25 2.25 0 0 0 2.25 2.25h13.5A2.25 2.25 0 0 0 21 18V8.25M3 8.25V6a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 6v2.25M3 8.25h18M8 3v3M16 3v3"/></svg><div class="lbl">CalendarDays</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg><div class="lbl">Clock</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.534-7-10a4 4 0 0 1 7-2.646A4 4 0 0 1 19 11c0 5.466-7 10-7 10Z"/></svg><div class="lbl">Heart</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m9 12 2 2 4-4"/></svg><div class="lbl">CheckCircle</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M14 5h5v5M19 5l-9 9M9 5H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"/></svg><div class="lbl">External</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M9 7h6M9 11h6M9 15h4M5 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/></svg><div class="lbl">Newspaper</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg><div class="lbl">Bars3</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="m21 21-4.35-4.35M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z"/></svg><div class="lbl">Search</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M5 7h14l-1.5 12a2 2 0 0 1-2 1.8H8.5a2 2 0 0 1-2-1.8L5 7Zm5 4v6m4-6v6M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg><div class="lbl">Trash</div></div>
    <div class="item"><svg viewBox="0 0 24 24"><circle cx="6" cy="18" r="2"/><circle cx="6" cy="18" r="6"/><path d="M4 4a16 16 0 0 1 16 16"/></svg><div class="lbl">Rss</div></div>
</div>
</body>
</html>
