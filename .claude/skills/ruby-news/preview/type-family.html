<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 18px; font-family: var(--font-primary); box-sizing: border-box; color: var(--text-content); }
    .row { display: flex; align-items: center; gap: 16px; padding: 6px 0; }
    .label { color: var(--text-content-muted); font-size: 10px; font-family: ui-monospace, monospace; min-width: 70px; }
    .demo { color: var(--text-content); font-size: 16px; }
    .w400 { font-weight: 400; }
    .w500 { font-weight: 500; }
    .w700 { font-weight: 700; }
</style>
</head>
<body>
    <div class="row"><div class="label">Regular · 400</div><div class="demo w400">Noto Sans KR — 루비 뉴스 한국어 본문 The quick brown fox</div></div>
    <div class="row"><div class="label">Medium · 500</div><div class="demo w500">Noto Sans KR — 루비 뉴스 한국어 본문 The quick brown fox</div></div>
    <div class="row"><div class="label">Bold · 700</div><div class="demo w700">Noto Sans KR — 루비 뉴스 한국어 본문 The quick brown fox</div></div>
</body>
</html>
