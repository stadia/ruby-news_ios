<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); color: var(--text-content); padding: 16px; font-family: var(--font-primary); box-sizing: border-box; }
    .row { display: flex; align-items: stretch; height: 80px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-subtle); margin-bottom: 8px; }
    .row > div { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 12px; font-size: 11px; }
    .row .name { font-weight: 600; }
    .row .val { color: var(--text-content-muted); font-family: ui-monospace, monospace; font-size: 9.5px; opacity: 0.85; }
    h4 { margin: 0 0 6px; font-size: 11px; color: var(--text-content-muted); font-weight: 500; }
</style>
</head>
<body>

<h4>Surface stack — depth via shade</h4>
<div class="row">
    <div style="background: oklch(0.145 0 0); color: var(--text-content);">
        <div class="name">bg-app</div>
        <div class="val">oklch(0.145 0 0)</div>
    </div>
    <div style="background: oklch(0.205 0 0); color: var(--text-content);">
        <div class="name">bg-surface</div>
        <div class="val">oklch(0.205 0 0)</div>
    </div>
    <div style="background: oklch(0.269 0 0); color: var(--text-content);">
        <div class="name">bg-surface-muted</div>
        <div class="val">oklch(0.269 0 0)</div>
    </div>
    <div style="background: oklch(0.446 0.037 257); color: var(--text-content);">
        <div class="name">bg-surface-hover</div>
        <div class="val">neutral-600</div>
    </div>
</div>

</body>
</html>
