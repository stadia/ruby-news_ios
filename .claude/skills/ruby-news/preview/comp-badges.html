<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 18px; font-family: var(--font-primary); box-sizing: border-box; color: var(--text-content); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
    .lbl { color: var(--text-content-muted); font-size: 10px; font-family: ui-monospace, monospace; min-width: 80px; }
    .badge {
        display: inline-flex; align-items: center;
        font-size: 12px; font-weight: 500;
        padding: 2px 8px;
        border-radius: 6px;
        box-shadow: inset 0 0 0 1px transparent;
    }
    .b-primary  { color: var(--accent-text);  background: oklch(0.723 0.192 150 / 0.1); box-shadow: inset 0 0 0 1px oklch(0.723 0.192 150 / 0.2); }
    .b-blue     { color: var(--info-text);    background: oklch(0.546 0.215 263 / 0.1); box-shadow: inset 0 0 0 1px oklch(0.546 0.215 263 / 0.2); }
    .b-success  { color: var(--color-success); background: oklch(0.648 0.175 132 / 0.1); box-shadow: inset 0 0 0 1px oklch(0.648 0.175 132 / 0.2); }
    .b-warning  { color: var(--color-warning); background: oklch(0.769 0.165 70 / 0.1); box-shadow: inset 0 0 0 1px oklch(0.769 0.165 70 / 0.2); }
    .b-danger   { color: var(--danger-text);  background: oklch(0.577 0.215 27 / 0.1); box-shadow: inset 0 0 0 1px oklch(0.577 0.215 27 / 0.2); }
    .b-neutral  { color: var(--text-content-secondary); background: var(--bg-surface-muted); box-shadow: inset 0 0 0 1px var(--border-muted); }
    .b-outline  { color: var(--text-content); background: var(--bg-surface); box-shadow: inset 0 0 0 1px var(--border-strong); }
    .pill { padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
</style>
</head>
<body>
    <div class="row">
        <div class="lbl">primary</div>
        <span class="badge b-primary">Following</span>
        <span class="badge b-primary">Ruby</span>
    </div>
    <div class="row">
        <div class="lbl">blue (host)</div>
        <span class="badge b-blue">github.com</span>
        <span class="badge b-blue">rubyweekly.com</span>
    </div>
    <div class="row">
        <div class="lbl">success</div>
        <span class="badge b-success">Active</span>
        <span class="badge b-warning">Requesting</span>
        <span class="badge b-danger">Failed</span>
    </div>
    <div class="row">
        <div class="lbl">neutral / outline</div>
        <span class="badge b-neutral">draft</span>
        <span class="badge b-outline">tag</span>
    </div>
    <div class="row">
        <div class="lbl">pill</div>
        <span class="pill b-primary">#rails</span>
        <span class="pill b-blue">#hotwire</span>
        <span class="pill b-neutral">#postgres</span>
    </div>
</body>
</html>
