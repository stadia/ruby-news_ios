<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 18px; font-family: var(--font-primary); box-sizing: border-box; color: var(--text-content); }
    .row { display: flex; flex-direction: column; gap: 6px; }
    .item { display: flex; align-items: baseline; gap: 14px; padding: 4px 0; }
    .label { color: var(--text-content-muted); font-size: 11px; font-family: ui-monospace, monospace; min-width: 110px; flex-shrink: 0; }
    .demo { color: var(--text-content); }
</style>
</head>
<body>
<div class="row">
    <div class="item"><div class="label">primary</div><div class="demo" style="color: var(--text-content);">본문 텍스트입니다 — primary text</div></div>
    <div class="item"><div class="label">secondary</div><div class="demo" style="color: var(--text-content-secondary);">본문 텍스트입니다 — secondary text</div></div>
    <div class="item"><div class="label">muted</div><div class="demo" style="color: var(--text-content-muted);">메타데이터 — muted text for time, counts</div></div>
    <div class="item"><div class="label">disabled</div><div class="demo" style="color: var(--text-content-disabled);">비활성 — disabled / placeholder text</div></div>
    <div class="item"><div class="label">accent-text</div><div class="demo" style="color: var(--accent-text);">루비 AI 뉴스 — accent / brand text</div></div>
    <div class="item"><div class="label">link</div><div class="demo" style="color: var(--link);">기사 더 보기 →</div></div>
    <div class="item"><div class="label">info-text</div><div class="demo" style="color: var(--info-text);">https://ruby-news.kr/articles/123</div></div>
    <div class="item"><div class="label">danger-text</div><div class="demo" style="color: var(--danger-text);">정말 삭제하시겠습니까?</div></div>
</div>
</body>
</html>
