<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); color: var(--text-content); padding: 18px; font-family: var(--font-primary); box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .swatch { border-radius: 10px; overflow: hidden; border: 1px solid var(--border-subtle); background: var(--bg-surface); }
    .chip { height: 60px; }
    .meta { padding: 8px 10px; font-size: 11px; line-height: 1.35; }
    .name { color: var(--text-content); font-weight: 600; letter-spacing: 0.01em; }
    .val { color: var(--text-content-muted); font-family: ui-monospace, monospace; font-size: 9.5px; margin-top: 2px; }
</style>
</head>
<body>
<div class="grid">
    <div class="swatch"><div class="chip" style="background:oklch(0.800 0.182 152)"></div><div class="meta"><div class="name">brand-light</div><div class="val">0.800 0.182 152</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.723 0.192 150)"></div><div class="meta"><div class="name">brand-primary</div><div class="val">0.723 0.192 150</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.627 0.170 149)"></div><div class="meta"><div class="name">brand-hover</div><div class="val">0.627 0.170 149</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.527 0.137 150)"></div><div class="meta"><div class="name">brand-dark</div><div class="val">0.527 0.137 150</div></div></div>
    <div class="swatch"><div class="chip" style="background:oklch(0.448 0.108 151)"></div><div class="meta"><div class="name">brand-deep</div><div class="val">0.448 0.108 151</div></div></div>
</div>
</body>
</html>
