<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<title>Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
    body {
        background: var(--bg-app);
        color: var(--text-content);
        padding: 20px;
        box-sizing: border-box;
        font-family: var(--font-primary);
    }
    .card-grid { display: grid; gap: 8px; }
    .swatch {
        display: flex; flex-direction: column;
        border-radius: var(--radius-md);
        overflow: hidden;
        border: 1px solid var(--border-subtle);
    }
    .swatch .chip { height: 56px; }
    .swatch .meta {
        padding: 8px 10px;
        background: var(--bg-surface);
        border-top: 1px solid var(--border-subtle);
        font-size: 11px;
        line-height: 1.3;
    }
    .swatch .name { color: var(--text-content); font-weight: 500; }
    .swatch .val { color: var(--text-content-muted); font-family: var(--font-mono); font-size: 10px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .label { color: var(--text-content-muted); font-size: 12px; font-weight: 500; min-width: 100px; }
    h1, h2, h3, h4, p { margin: 0; }
</style>
</head>
<body>
<div id="content"></div>
</body>
</html>
