<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 16px; font-family: var(--font-primary); box-sizing: border-box; color: var(--text-content); }
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; align-items: end; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .box { width: 76px; height: 76px; background: var(--bg-surface-muted); border: 1px solid var(--border-strong); }
    .lbl { font-size: 11px; color: var(--text-content); font-weight: 600; }
    .val { font-size: 9.5px; color: var(--text-content-muted); font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<div class="grid">
    <div class="item"><div class="box" style="border-radius: 6px"></div><div class="lbl">sm</div><div class="val">6px</div></div>
    <div class="item"><div class="box" style="border-radius: 8px"></div><div class="lbl">md</div><div class="val">8px</div></div>
    <div class="item"><div class="box" style="border-radius: 12px"></div><div class="lbl">lg</div><div class="val">12px</div></div>
    <div class="item"><div class="box" style="border-radius: 16px"></div><div class="lbl">xl</div><div class="val">16px</div></div>
    <div class="item"><div class="box" style="border-radius: 24px"></div><div class="lbl">2xl</div><div class="val">24px</div></div>
    <div class="item"><div class="box" style="border-radius: 9999px"></div><div class="lbl">full</div><div class="val">9999px</div></div>
</div>
</body>
</html>
