<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 16px; font-family: var(--font-primary); box-sizing: border-box; color: var(--text-content); }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 13px; color: var(--text-content); margin-bottom: 6px; font-weight: 500; }
    input[type="text"], input[type="email"], input[type="password"], textarea {
        width: 100%; box-sizing: border-box;
        background: var(--bg-surface-muted);
        color: var(--text-content);
        border: 1px solid var(--border-muted);
        border-radius: 8px;
        padding: 8px 12px;
        font: 14px var(--font-primary);
        outline: none;
        transition: border-color 200ms, box-shadow 200ms;
    }
    input::placeholder, textarea::placeholder { color: var(--text-content-muted); }
    input:focus, textarea:focus {
        border-color: transparent;
        box-shadow: 0 0 0 2px var(--brand-primary);
    }
    textarea { min-height: 60px; resize: vertical; font-family: inherit; }
    .help { color: var(--text-content-muted); font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>
    <div class="field">
        <label for="email">이메일</label>
        <input id="email" type="email" placeholder="email 주소" value="reader@ruby-news.kr">
    </div>
    <div class="field">
        <label for="search">검색</label>
        <input id="search" type="text" placeholder="검색...">
        <div class="help">제목, 본문, 태그를 한국어/영어로 검색합니다.</div>
    </div>
    <div class="field">
        <label for="comment">댓글</label>
        <textarea id="comment" placeholder="의견을 남겨주세요"></textarea>
    </div>
</body>
</html>
