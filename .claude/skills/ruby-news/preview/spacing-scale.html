<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 16px; font-family: var(--font-primary); color: var(--text-content); box-sizing: border-box; }
    .row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
    .label { color: var(--text-content-muted); font-size: 10px; font-family: ui-monospace, monospace; min-width: 60px; flex-shrink: 0; }
    .px { color: var(--text-content-muted); font-size: 10px; font-family: ui-monospace, monospace; min-width: 50px; flex-shrink: 0; text-align: right; }
    .bar { height: 14px; background: var(--brand-primary-dark); border-radius: 2px; }
</style>
</head>
<body>
    <div class="row"><div class="label">xs</div><div class="bar" style="width: 4px"></div><div class="px">4px</div></div>
    <div class="row"><div class="label">sm</div><div class="bar" style="width: 8px"></div><div class="px">8px</div></div>
    <div class="row"><div class="label">md</div><div class="bar" style="width: 16px"></div><div class="px">16px</div></div>
    <div class="row"><div class="label">lg</div><div class="bar" style="width: 24px"></div><div class="px">24px</div></div>
    <div class="row"><div class="label">xl</div><div class="bar" style="width: 32px"></div><div class="px">32px</div></div>
    <div class="row"><div class="label">2xl</div><div class="bar" style="width: 48px"></div><div class="px">48px</div></div>
    <div class="row"><div class="label">3xl</div><div class="bar" style="width: 64px"></div><div class="px">64px</div></div>
    <div class="row"><div class="label">4xl</div><div class="bar" style="width: 96px"></div><div class="px">96px</div></div>
</body>
</html>
