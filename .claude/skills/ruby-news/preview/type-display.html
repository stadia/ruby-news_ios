<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 18px; font-family: var(--font-primary); box-sizing: border-box; color: var(--text-content); }
    .row { display: flex; align-items: baseline; gap: 14px; padding: 4px 0; border-bottom: 1px solid var(--border-subtle); }
    .row:last-child { border-bottom: 0; }
    .label { color: var(--text-content-muted); font-size: 10px; font-family: ui-monospace, monospace; min-width: 80px; flex-shrink: 0; }
    h1 { font-size: 36px; line-height: 1.25; font-weight: 700; color: var(--text-content); margin: 0; }
    h2 { font-size: 24px; line-height: 1.375; font-weight: 700; color: var(--text-content); margin: 0; }
    h3 { font-size: 20px; line-height: 1.375; font-weight: 700; color: var(--text-content); margin: 0; }
    h4 { font-size: 18px; line-height: 1.375; font-weight: 600; color: var(--text-content); margin: 0; }
</style>
</head>
<body>
    <div class="row"><div class="label">36 / 700</div><h1>루비, 레일스 AI 뉴스</h1></div>
    <div class="row"><div class="label">24 / 700</div><h2>핵심 요약</h2></div>
    <div class="row"><div class="label">20 / 700</div><h3>관련 글들</h3></div>
    <div class="row"><div class="label">18 / 600</div><h4>섹션 제목 — Section heading</h4></div>
</body>
</html>
