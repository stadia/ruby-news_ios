name: ruby-news
options:
  bundleIdPrefix: kr.stadia
  deploymentTarget:
    iOS: "26.4"
  developmentLanguage: en

configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig

packages:
  HotwireNative:
    url: https://github.com/hotwired/hotwire-native-ios
    majorVersion: 1.2.2
  SDWebImageSwiftUI:
    url: https://github.com/SDWebImage/SDWebImageSwiftUI
    majorVersion: 3.0.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    majorVersion: 4.0.0
  SwiftLint:
    url: https://github.com/realm/SwiftLint
    majorVersion: 0.57.0
  Mocker:
    url: https://github.com/WeTransfer/Mocker
    majorVersion: 3.0.0

targets:
  ruby-news:
    type: application
    platform: iOS
    sources:
      - ruby-news
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.stadia.ruby-news
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SWIFT_VERSION: "5.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
    dependencies:
      - package: HotwireNative
      - package: SDWebImageSwiftUI
      - package: KeychainAccess
      - package: SwiftLint
        plugin: SwiftLintBuildToolPlugin

  ruby-newsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ruby-newsTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.stadia.ruby-newsTests
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "26.4"
        SWIFT_VERSION: "5.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_EMIT_LOC_STRINGS: NO
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        STRING_CATALOG_GENERATE_SYMBOLS: NO
    dependencies:
      - target: ruby-news
      - package: Mocker

  ruby-newsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ruby-newsUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.stadia.ruby-newsUITests
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_EMIT_LOC_STRINGS: NO
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        STRING_CATALOG_GENERATE_SYMBOLS: NO
    dependencies:
      - target: ruby-news
